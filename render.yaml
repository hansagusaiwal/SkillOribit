services:
  - type: web
    name: skillorbit-backend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: skillorbit-backend
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: SKILLORBIT_MAX_CANDIDATES
        value: "2000"
    healthCheckPath: /api/health
